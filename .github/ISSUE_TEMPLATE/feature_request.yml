name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that the plugin doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Your idea for how this could work. Doesn't need to be fully thought out.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Anything you've tried as a workaround?
      description: Optional, but helps figure out how badly this is needed.
